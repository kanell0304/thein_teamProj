spring.application.name=momeogji
server.port=8081

# 로컬 개발 기본값. 배포 환경에서는 SPRING_PROFILES_ACTIVE 환경변수로 dev가 아닌 값(prod 등)을 넣어서
# DevAuthController(@Profile("dev")) 같은 개발 전용 기능이 자동으로 비활성화되게 한다.
spring.profiles.active=dev

# backend/.env 파일이 있으면 읽어와 OPENAI_API_KEY 같은 값을 채운다. .env는 git에 커밋되지 않음(.env.example 참고)
spring.config.import=optional:file:.env[.properties]

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/momeokji
spring.datasource.username=postgres
spring.datasource.password=1234

# 로그인 회원 등 로컬 데이터를 서버 재실행 후에도 유지한다.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# MyBatis는 채팅방 목록처럼 집계가 필요한 읽기 전용 복합 조회에 사용한다.
mybatis.mapper-locations=classpath:/mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# Swagger/OpenAPI 문서 확인 주소: /swagger-ui/index.html, /v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.api-docs.path=/v3/api-docs

# OpenAI (음식점 추천 AI)
openai.api-key=${OPENAI_API_KEY:}
openai.base-url=https://api.openai.com/v1
openai.model=gpt-5.5
# none/low/medium/high/xhigh 중 선택. none이 5~10배 빠르면서 실측상 주소 품질도 준수해 기본값으로 둠.
openai.reasoning-effort=none

# 카카오 로컬 API (최종 공지 음식점 주소/좌표 검증)
kakao.rest-api-key=${KAKAO_REST_API_KEY:}
kakao.base-url=https://dapi.kakao.com

# MyData 가맹점명으로 조회한 카카오 장소 후보의 JVM 로컬 캐시
mydata.kakao-search-cache.ttl=60m
mydata.kakao-search-cache.maximum-size=5000

# MyData 외부 요청 1회 재시도와 카카오 검색 회로 차단 정책
mydata.recovery.retry-delay=300ms
mydata.recovery.kakao-circuit-failure-threshold=3
mydata.recovery.kakao-circuit-open-duration=60s

# 카카오 로그인 (같은 앱의 REST API 키를 재사용. 카카오 개발자 콘솔에서 "카카오 로그인" 제품 활성화 + Redirect URI 등록 필요)
kakao.login-redirect-uri=http://localhost:5173/oauth/kakao/callback
# 카카오 콘솔에서 Client Secret을 사용 설정한 경우에만 필요 - 비어있으면 토큰 요청에 포함하지 않는다.
kakao.client-secret=${KAKAO_CLIENT_SECRET:}

# JWT (자체 발급 액세스 토큰)
jwt.secret=${JWT_SECRET:}
jwt.access-token-expiration-minutes=60

# 구글 Places API (New) - 음식점 대표 이미지 정확도 향상용. 비어있으면 카카오 이미지 검색으로 자동 폴백.
google.places-api-key=${GOOGLE_PLACES_API_KEY:}

# 웹소켓(/ws) 핸드셰이크를 허용할 프론트 origin. 콤마로 여러 개 지정 가능.
# "null"은 websocket-test/chat-test.html을 로컬 파일(file://)로 그냥 열어서 테스트할 때 브라우저가 보내는
# Origin 값이라 로컬 개발용으로 추가해뒀다 - 배포 시에는 실제 프론트 도메인만 남기고 반드시 빼야 한다.
app.cors.allowed-origins=http://localhost:5173,null
