spring.application.name=momeogji
server.port=8081

# backend/.env 파일이 있으면 읽어와 OPENAI_API_KEY 같은 값을 채운다. .env는 git에 커밋되지 않음(.env.example 참고)
spring.config.import=optional:file:.env[.properties]

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/hrd
spring.datasource.username=postgres
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# OpenAI (음식점 추천 AI)
openai.api-key=${OPENAI_API_KEY:}
openai.base-url=https://api.openai.com/v1
openai.model=gpt-5.5
# none/low/medium/high/xhigh 중 선택. none이 5~10배 빠르면서 실측상 주소 품질도 준수해 기본값으로 둠.
openai.reasoning-effort=none

# 카카오 로컬 API (최종 공지 음식점 주소/좌표 검증)
kakao.rest-api-key=${KAKAO_REST_API_KEY:}
kakao.base-url=https://dapi.kakao.com